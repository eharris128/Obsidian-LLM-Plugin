name: CI

# Type-check, lint, and stylesheet-policy gate. Runs on every push to main and
# on every PR so scorecard-relevant regressions (a stray `!important`, a type
# error, an eslint/obsidianmd violation) fail here before a release is cut.
# Release builds run separately in release.yml on tag pushes.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Enforces the zero-`!important` policy (see docs/styling-important-policy.md).
      - name: Check for !important in CSS
        run: npm run lint:css

      - name: Type-check
        run: npm run typecheck

      # Enforces the obsidianmd scorecard lint preset (must stay at zero warnings).
      - name: Lint
        run: npm run lint
