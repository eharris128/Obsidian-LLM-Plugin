name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Attest main.js
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: main.js

      - name: Attest styles.css
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: styles.css

      - name: Create or update release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          gh release create "$tag" main.js styles.css manifest.json \
            --title "$tag" \
            --generate-notes \
            --clobber 2>/dev/null || \
          gh release upload "$tag" main.js styles.css manifest.json --clobber
